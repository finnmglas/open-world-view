# responsible: finn
# goal: run the app easily
#
# run: docker compose up --build
# run detached: docker compose up --build -d
# stop: docker compose down

# frontend - backend - data layers
services:

  ###########################
  ## --- frontend layer --- #
  ###########################

  # prod fe: build and start (more efficient, faster)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: open-world-view-frontend-prod
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.production
    restart: unless-stopped
    profiles: ["prod"]
  
  # dev fe: local mount, hot reload (takes more ram)
  web-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # named volumes so node_modules/.next are linux-native and persist across restarts
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: http://api-dev:8000
    # pnpm install at startup picks up any packages added on the host
    command: sh -c "pnpm install && pnpm dev"
    depends_on:
      - api-dev
    profiles: ["dev"]
  
  ##########################
  ## --- backend layer --- #
  ##########################

  # prod backend: build and run reliable
  api:
    build:
      context: ./python
      dockerfile: Dockerfile
    image: fastapi-backend-prod
    # ports:
    #   - "8000:8000"
    env_file:
      - ./python/.env.production
    restart: unless-stopped
    profiles: ["prod"]

  # dev backend: hot reload, debug
  api-dev:
    build:
      context: ./python
      dockerfile: Dockerfile.dev
    # ports:
    #   - "8000:8000"
    volumes:
      - ./python:/app
    environment:
      PYTHONUNBUFFERED: "1"
    profiles: ["dev"]

  #######################
  ## --- data layer --- #
  #######################

  # qdrant vector db for dev & prod (embeddings)
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    restart: unless-stopped
    # ports:
    #   - "6333:6333"
    #   - "6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - ./data_qdrant:/qdrant/storage

  # postgres sql db for dev & prod (tabular data store)
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data_postgres:/var/lib/postgresql/data

  # redis memory layer for dev & prod (caching data)
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    # ports:
    #   - "6379:6379"
    volumes:
      - ./data_redis:/data

volumes:
  frontend_node_modules:
  frontend_next: